[build-system]
requires = [
    "setuptools>=42",
    "versioneer",
    "packaging",
]
build-backend = "build_requires"
backend-path = [""]

[project]
name = "amulet-core"
authors = [
    {name = "James Clare"},
    {name = "Ben Gothard"},
]
description = "A Python library for reading/writing Minecraft's various save formats."
dynamic = ["version", "readme", "dependencies"]
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]

[project.optional-dependencies]
dev = [
    "setuptools>=42",
    "types-setuptools",
    "versioneer",
    "types-versioneer",
    "packaging",
    "pybind11_stubgen>=2.5.4",
    "black>=22.3",
    "isort",
    "autoflake",
    "mypy",
    "types-pyinstaller",
    "amulet-test-utils~=1.3",
]
docs = [
    "Sphinx>=1.7.4",
    "sphinx-autodoc-typehints>=1.3.0",
    "sphinx_rtd_theme>=0.3.1",
]

[project.urls]
Homepage = "https://www.amuletmc.com"
Repository = "https://github.com/Amulet-Team/Amulet-Core"
Issues = "https://github.com/Amulet-Team/Amulet-Core/issues"

[tool.setuptools]
include-package-data = false

[tool.setuptools.package-data]
"*" = [
    "*Config.cmake",
    "**/*.hpp",
    "**/*.dll",
    "**/*.so",
    "**/*.dylib",
    "**/*.lib",
]

[tool.setuptools.dynamic]
readme = {file = ["README.md"], content-type = "text/markdown"}

[project.entry-points.pyinstaller40]
hook-dirs = "amulet.core.__pyinstaller:get_hook_dirs"

[tool.versioneer]
VCS = "git"
style = "pep440"
versionfile_source = "src/amulet/core/_version.py"
versionfile_build = "amulet/core/_version.py"
tag_prefix = ""
parentdir_prefix = "amulet_core-"

[tool.cibuildwheel]
test-sources = ["tests", "tools/compile_tests.py"]
test-command = [
    "python -m venv venv_build",
    "venv_build/bin/pip install {wheel}[dev]",
    "venv_build/bin/python tools/compile_tests.py",
    "python -m unittest discover -s tests"
]

manylinux-x86_64-image = "manylinux_2_34"

[tool.cibuildwheel.linux]
before-all = "yum install -y cmake"
repair-wheel-command = "auditwheel repair --exclude libamulet_utils.so --exclude libamulet_nbt.so -w {dest_dir} {wheel}"

[tool.cibuildwheel.macos]
repair-wheel-command = "delocate-wheel --require-archs {delocate_archs} --ignore-missing-dependencies --exclude libamulet_utils.dylib --exclude libamulet_nbt.dylib -w {dest_dir} -v {wheel}"

[tool.cibuildwheel.windows]
repair-wheel-command = "delvewheel repair --ignore-existing --exclude \"msvcp140.dll;amulet_utils.dll;amulet_nbt.dll\" -w {dest_dir} -v {wheel}"
test-command = [
    "python -m venv venv_build",
    "venv_build\\Scripts\\pip install {wheel}[dev]",
    "venv_build\\Scripts\\python tools/compile_tests.py",
    "python -m unittest discover -s tests"
]
